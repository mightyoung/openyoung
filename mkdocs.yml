# MkDocs configuration for OpenYoung
# Install: pip install mkdocs mkdocs-material mkdocstrings

site_name: OpenYoung API Documentation
site_description: OpenYoung AI Agent Platform API Documentation
site_author: OpenYoung Team

theme:
  name: material
  palette:
    - primary: indigo
    - accent: blue
  features:
    - navigation.tabs
    - navigation.sections

# API documentation generation
plugins:
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_category_heading: true

nav:
  - Home: index.md
  - API Reference:
      - agents: api/generated/agents_young_agent.md
      - datacenter: api/generated/datacenter_datacenter.md
      - llm: api/generated/llm_client.md
      - evaluation: api/generated/evaluation_hub.md
  - Manuals:
      - User Manual: ../manuals/user-manual.md
      - Configuration: ../manuals/configuration-manual.md
      - Deployment: ../manuals/deployment-manual.md
