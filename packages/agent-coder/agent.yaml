name: "agent-coder"
version: "1.0.0"
description: "Coder Agent - 专注于代码编写和重构"

model:
  name: "deepseek-coder"
  temperature: 0.3
  max_tokens: 8192

tools:
  - read
  - write
  - edit
  - bash
  - glob
  - grep

skills:
  - coding-standards
  - tdd-london-swarm

# SubAgents - 参考 Claude Code Task 协议
sub_agents:
  - name: explore
    type: explore
    description: "快速探索代码库，只读操作"
    model: "deepseek-chat"
  - name: general
    type: general
    description: "通用任务处理"
    model: "deepseek-chat"
  - name: search
    type: search
    description: "复杂搜索任务"
    model: "deepseek-chat"
  - name: builder
    type: builder
    description: "构建和执行任务"
    model: "deepseek-coder"
  - name: reviewer
    type: reviewer
    description: "代码审查"
    model: "deepseek-chat"
  - name: eval
    type: eval
    description: "评估任务"
    model: "deepseek-chat"

permission:
  _global: ask
  rules:
    - tool: "bash"
      action: ask
    - tool: "write"
      action: ask
    - tool: "edit"
      action: ask
