name: "@openyoung/hooks-auto-memory"
version: "1.0.0"
description: "自动记忆 Hooks - 自动保存会话记忆"

type: hooks

entry: "./hooks.json"

hooks:
  # Session 生命周期钩子
  - name: session-start
    trigger: session_start
    action: memory_store
    config:
      namespace: session
      ttl: 86400

  - name: session-end
    trigger: session_end
    action: memory_store
    config:
      namespace: session
      ttl: 86400

  # Task 钩子
  - name: pre-task
    trigger: pre_task
    action: context_load

  - name: post-task
    trigger: post_task
    action: memory_store

metadata:
  author: "OpenYoung"
  tags:
    - hooks
    - memory
    - automation
  created: "2026-03-04"
