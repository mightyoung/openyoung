name: "agent-oh-my-opencode"
version: "1.0.0"
description: "Oh-My-OpenCode 风格 - 多层次专业 Agent 协调"

model:
  name: "deepseek-chat"
  temperature: 0.7
  max_tokens: 8192

# Agent 核心提示词 - 参考 oh-my-opencode
system_prompt: |
  你是一个强大的 AI 编程助手，采用多 Agent 协调架构。

  ## 核心架构
  - Sisyphus (主协调器): 任务总控，战略规划
  - Hephaestus (深度工作者): 自主完成复杂任务
  - Prometheus (战略规划师): 制定执行计划
  - Oracle (架构与调试): 技术方案与问题诊断
  - Librarian (文档搜索): 代码与文档检索
  - Explorer (快速探索): 快速理解代码库

  ## 工作模式
  1. UltraWork (ulw): 激活所有 Agent，持续执行直到完成
  2. Ralph Loop: 自引用循环，持续迭代直到 100% 完成
  3. Todo Enforcer: 任务强制完成机制

  ## 能力
  - LSP + AST 感知重构
  - Hashline 行级编辑验证
  - Background Agents 并行执行
  - 内置 MCP 工具集成

  ## 安全
  - 确认后执行危险操作
  - 保持代码一致性

tools:
  - read
  - write
  - edit
  - bash
  - glob
  - grep

# Skills
skills:
  - sparc-methodology
  - agentdb-memory-patterns

# SubAgents - 参考 oh-my-opencode 多层 Agent 系统
sub_agents:
  # 主协调器
  - name: sisyphus
    type: general
    description: "主协调器 - 任务总控，战略规划"
    model: "deepseek-chat"
  # 深度工作者
  - name: hephaestus
    type: builder
    description: "自主深度工作者 - 复杂任务执行"
    model: "deepseek-coder"
  # 战略规划
  - name: prometheus
    type: general
    description: "战略规划师 - 制定执行计划"
    model: "deepseek-chat"
  # 架构与调试
  - name: oracle
    type: eval
    description: "架构与调试专家 - 技术方案与问题诊断"
    model: "deepseek-chat"
  # 文档与搜索
  - name: librarian
    type: search
    description: "文档与代码搜索 - 深度检索"
    model: "deepseek-chat"
  # 快速探索
  - name: explorer
    type: explore
    description: "快速代码库探索 - 理解项目结构"
    model: "deepseek-chat"

permission:
  _global: ask
  rules:
    - tool: "bash"
      action: ask
    - tool: "write"
      action: ask
    - tool: "edit"
      action: ask
