# R3-1: Pre-commit hooks configuration
# https://pre-commit.com/

repos:
  # Check for large files (max 500KB)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # Ruff - Fast Python linter (replaces flake8, isort, etc.)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      # Run ruff linter (report only, don't fix in CI)
      - id: ruff
        args: []  # Remove --fix to avoid CI failures
      # Run ruff formatter
      - id: ruff-format

  # MyPy type checking (disabled for now - needs config fix)
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.19.1
  #   hooks:
  #     - id: mypy
  #       args: [--ignore-missing-imports, --no-error-summary]
  #       files: ^src/
  #       pass_filenames: false

# Exclude generated files and directories
default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit]

# Files to exclude from all hooks
exclude: |
  (?x)^(
    \.claude/|
    \.github/|
    \.swarm/|
    \.claude-flow/|
    scripts/output/|
    scripts/weibo_|
    skills/|
    evals/|
    debug_|
    github-import-workspace/|
    \.openyoung/
  )
