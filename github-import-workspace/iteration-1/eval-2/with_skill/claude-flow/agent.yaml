system_prompt: "# Claude Code Configuration - SPARC Development Environment (Batchtools\
  \ Optimized)\n\n## \U0001F6A8 CRITICAL: CONCURRENT EXECUTION FOR ALL ACTIONS\n\n\
  **ABSOLUTE RULE**: ALL operations MUST be concurrent/parallel in a single message:\n\
  \n### \U0001F534 MANDATORY CONCURRENT PATTERNS:\n1. **TodoWrite**: ALWAYS batch\
  \ ALL todos in ONE call (5-10+ todos minimum)\n2. **Task tool**: ALWAYS spawn ALL\
  \ agents in ONE message with full instructions\n3. **File operations**: ALWAYS batch\
  \ ALL reads/writes/edits in ONE message\n4. **Bash commands**: ALWAYS batch ALL\
  \ terminal operations in ONE message\n5. **Memory operations**: ALWAYS batch ALL\
  \ memory store/retrieve in ONE message\n\n### ⚡ GOLDEN RULE: \"1 MESSAGE = ALL RELATED\
  \ OPERATIONS\"\n\n**Examples of CORRECT concurrent execution:**\n```javascript\n\
  // ✅ CORRECT: Everything in ONE message\n[Single Message]:\n  - TodoWrite { todos:\
  \ [10+ todos with all statuses/priorities] }\n  - Task(\"Agent 1 with full instructions\
  \ and hooks\")\n  - Task(\"Agent 2 with full instructions and hooks\")\n  - Task(\"\
  Agent 3 with full instructions and hooks\")\n  - Read(\"file1.js\")\n  - Read(\"\
  file2.js\")\n  - Write(\"output1.js\", content)\n  - Write(\"output2.js\", content)\n\
  \  - Bash(\"npm install\")\n  - Bash(\"npm test\")\n  - Bash(\"npm run build\")\n\
  ```\n\n**Examples of WRONG sequential execution:**\n```javascript\n// ❌ WRONG: Multiple\
  \ messages (NEVER DO THIS)\nMessage 1: TodoWrite { todos: [single todo] }\nMessage\
  \ 2: Task(\"Agent 1\")\nMessage 3: Task(\"Agent 2\")\nMessage 4: Read(\"file1.js\"\
  )\nMessage 5: Write(\"output1.js\")\nMessage 6: Bash(\"npm install\")\n// This is\
  \ 6x slower and breaks coordination!\n```\n\n### \U0001F3AF CONCURRENT EXECUTION\
  \ CHECKLIST:\n\nBefore sending ANY message, ask yourself:\n- ✅ Are ALL related TodoWrite\
  \ operations batched together?\n- ✅ Are ALL Task spawning operations in ONE message?\n\
  - ✅ Are ALL file operations (Read/Write/Edit) batched together?\n- ✅ Are ALL bash\
  \ commands grouped in ONE message?\n- ✅ Are ALL memory operations concurrent?\n\n\
  If ANY answer is \"No\", you MUST combine operations into a single message!\n\n\
  ## Project Overview\nThis project uses the SPARC (Specification, Pseudocode, Architecture,\
  \ Refinement, Completion) methodology for systematic Test-Driven Development with\
  \ AI assistance through Claude-Flow orchestration.\n\n**\U0001F680 Batchtools Optimization\
  \ Enabled**: This configuration includes optimized prompts and parallel processing\
  \ capabilities for improved performance and efficiency.\n\n## SPARC Development\
  \ Commands\n\n### Core SPARC Commands\n- `npx claude-flow@alpha sparc modes`: List\
  \ all available SPARC development modes\n- `npx claude-flow@alpha sparc run <mode>\
  \ \"<task>\"`: Execute specific SPARC mode for a task\n- `npx claude-flow@alpha\
  \ sparc tdd \"<feature>\"`: Run complete TDD workflow using SPARC methodology\n\
  - `npx claude-flow@alpha sparc info <mode>`: Get detailed information about a specific\
  \ mode\n\n### Batchtools Commands (Optimized)\n- `npx claude-flow@alpha sparc batch\
  \ <modes> \"<task>\"`: Execute multiple SPARC modes in parallel\n- `npx claude-flow@alpha\
  \ sparc pipeline \"<task>\"`: Execute full SPARC pipeline with parallel processing\n\
  - `npx claude-flow@alpha sparc concurrent <mode> \"<tasks-file>\"`: Process multiple\
  \ tasks concurrently\n\n### Standard Build Commands\n- `npm run build`: Build the\
  \ project\n- `npm run test`: Run the test suite\n- `npm run lint`: Run linter and\
  \ format checks\n- `npm run typecheck`: Run TypeScript type checking\n\n## SPARC\
  \ Methodology Workflow (Batchtools Enhanced)\n\n### 1. Specification Phase (Parallel\
  \ Analysis)\n```bash\n# Create detailed specifications with concurrent requirements\
  \ analysis\nnpx claude-flow@alpha sparc run spec-pseudocode \"Define user authentication\
  \ requirements\" --parallel\n```\n**Batchtools Optimization**: Simultaneously analyze\
  \ multiple requirement sources, validate constraints in parallel, and generate comprehensive\
  \ specifications.\n\n### 2. Pseudocode Phase (Concurrent Logic Design)\n```bash\n\
  # Develop algorithmic logic with parallel pattern analysis\nnpx claude-flow@alpha\
  \ sparc run spec-pseudocode \"Create authentication flow pseudocode\" --batch"
