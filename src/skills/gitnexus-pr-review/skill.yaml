name: gitnexus-pr-review
description: "Use when the user wants to review a pull request, understand what a PR changes, assess risk of merging, or check for missing test coverage. Examples: 'Review this PR', 'What does PR #42 change?', 'Is this PR safe to merge?', 'PR审查'. IMPORTANT: Always check index health before using GitNexus tools."
trigger_patterns:
  - "PR"
  - "review"
  - "合并"
  - "pull request"
  - "审查"
  - "merge"
tags:
  - pr-review
  - code-review
  - risk-assessment
requires:
  bins:
    - node
    - npm
    - npx
    - gitnexus
